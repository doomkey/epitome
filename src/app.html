<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Epitome Resume Builder by Doomkey</title>
		<meta name="description" content="Feature-packed, free, browser-only resume builder." />
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="https://doomkey.github.io/epitome/apple-touch-icon.png"
		/>
		<link
			rel="icon"
			type="image/png"
			href="https://doomkey.github.io/epitome/favicon-96x96.png"
			sizes="96x96"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="https://doomkey.github.io/epitome/favicon-32x32.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="16x16"
			href="https://doomkey.github.io/epitome/favicon-16x16.png"
		/>
		<link rel="manifest" href="https://doomkey.github.io/epitome/site.webmanifest" />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Epitome Resume Builder" />
		<meta property="og:url" content="https://doomkey.github.io/epitome/" />
		<meta property="og:description" content="Feature-packed, free, local-only resume builder." />
		<meta property="og:image" content="https://doomkey.github.io/epitome/banner_epitome.png" />
		<meta name="robots" content="index, follow" />
		<meta name="google-site-verification" content="5VHaMF8eAcZ9vPOKXZW4QqB-X2FvwaZMNlLKpDLYvh0" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<!-- 100% privacy-first analytics -->
		<script
			data-goatcounter="https://doomkey.goatcounter.com/count"
			async
			src="https://gc.zgo.at/count.js"
		></script>
	</body>
</html>
